<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizacion aceptada · ASTRAL WEDDINGS</title>
<style>
  :root {
    --ink: #15171c;
    --muted: #6f7580;
    --line: #d9dde3;
    --green: #087f45;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, Arial, sans-serif;
    color: var(--ink);
    background: #f7f7f5;
  }
  .page {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
  }
  .modal {
    width: min(520px, 100%);
    background: white;
    border: 1px solid var(--line);
    border-radius: 6px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, .18);
    padding: 48px 42px 36px;
    text-align: center;
  }
  .check {
    width: 48px;
    height: 48px;
    border-radius: 999px;
    margin: 0 auto 18px;
    display: grid;
    place-items: center;
    background: #e2f8ec;
    color: var(--green);
    font-size: 26px;
    font-weight: 700;
  }
  h1 {
    margin: 0 0 16px;
    font-size: 28px;
    font-weight: 650;
    letter-spacing: 0;
  }
  p {
    margin: 0;
    color: var(--muted);
    line-height: 1.55;
  }
  .actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 30px;
    flex-wrap: wrap;
  }
  a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    padding: 0 18px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 14px;
    border: 1px solid var(--line);
    color: var(--ink);
  }
  a.primary {
    color: white;
    background: var(--green);
    border-color: var(--green);
  }
</style>
</head>
<body>
  <main class="page">
    <section class="modal" role="dialog" aria-labelledby="accepted-title">
      <div class="check">✓</div>
      <h1 id="accepted-title">Cotizacion aceptada</h1>
      <p>
        Gracias por aceptar esta cotizacion. Ya se genero la factura correspondiente
        y quedo reflejada en el job.
      </p>
      <div class="actions">
        {% if quote.job_id %}
        <a class="primary" href="/jobs/{{ quote.job_id }}">Ver job</a>
        {% endif %}
        <a href="/quotes/{{ quote.id }}">Ver cotizacion</a>
      </div>
    </section>
  </main>
</body>
</html>
