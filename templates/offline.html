<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sin conexion · Flow CRM</title>
<style>
  :root { --ink: #0A0E1A; --soft: #6B7280; --line: #E4E7EC; --bg: #F7F8FC; --blue: #0284C7; }
  :root[data-theme="dark"] { --ink: #F1F3F7; --soft: #9AA6BC; --line: #26304A; --bg: #0A0E1A; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg); color: var(--ink);
  }
  body {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    padding-bottom: calc(24px + env(safe-area-inset-bottom));
    padding-top: calc(24px + env(safe-area-inset-top));
  }
  .card {
    max-width: 380px; width: 100%; text-align: center;
    background: transparent;
  }
  .icon {
    width: 56px; height: 56px; margin: 0 auto 20px;
    border-radius: 14px;
    background: rgba(2, 132, 199, .12);
    border: 1px solid rgba(2, 132, 199, .25);
    display: grid; place-items: center;
    color: var(--blue);
  }
  .icon svg { width: 26px; height: 26px; }
  h1 { font-size: 19px; font-weight: 700; margin: 0 0 8px; }
  p { font-size: 14px; color: var(--soft); line-height: 1.6; margin: 0 0 24px; }
  button {
    height: 44px; padding: 0 22px; border-radius: 10px; border: none;
    background: var(--blue); color: #fff; font-size: 14px; font-weight: 600;
    cursor: pointer;
  }
  button:active { opacity: .85; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M18.364 5.636a9 9 0 010 12.728M5.636 5.636a9 9 0 000 12.728M12 12l6-6M6 18l6-6m0 0l6 6M12 12L6 6"/></svg>
  </div>
  <h1>Sin conexion</h1>
  <p>No se pudo cargar esta pagina porque no hay internet. Tus datos privados nunca se guardan sin conexion -- conectate y vuelve a intentar.</p>
  <button type="button" onclick="window.location.reload()">Reintentar</button>
</div>
<script>
(function() {
  try {
    var saved = localStorage.getItem('flowcrm-theme');
    document.documentElement.setAttribute('data-theme', saved === 'dark' ? 'dark' : 'light');
  } catch (e) {}
})();
</script>
</body>
</html>
