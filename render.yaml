services:
  - type: web
    name: crm-norkevin
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: CRM_DATA_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: 3.11.9
    disk:
      name: crm-norkevin-data
      mountPath: /var/data
      sizeGB: 1
